services:
  web:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - ./.env.dev
    depends_on:
      - db
    networks:
      - marcianos_network

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=bookstore_portfolio_db
      - POSTGRES_USER=bookstore_admin
      - POSTGRES_PASSWORD=bookstore_secure_pass
    networks:
      - marcianos_network

volumes:
  postgres_data:

networks:
  marcianos_network:
    driver: bridge
name: Django Continuous Integration (CI)

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test-and-build:
    name: Run Linter, Migrations and Pytest
    runs-on: ubuntu-latest

    services:
      postgres_db:
        image: postgres:16.0-alpine
        env:
          POSTGRES_DB: bookstore_dev_db
          POSTGRES_USER: bookstore_dev
          POSTGRES_PASSWORD: bookstore_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bookstore_dev -d bookstore_dev_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DEBUG: "1"
      SECRET_KEY: "ci-cd-test-secret-key-super-safe"
      DJANGO_ALLOWED_HOSTS: "localhost 127.0.0.1"

      DATABASE_URL: "postgres://bookstore_dev:bookstore_dev@localhost:5432/bookstore_dev_db"
      POSTGRES_DB: "bookstore_dev_db"
      POSTGRES_USER: "bookstore_dev"
      POSTGRES_PASSWORD: "bookstore_dev"
      POSTGRES_HOST: "localhost"
      POSTGRES_PORT: "5432"

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry Virtual Environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install Project Dependencies
        run: poetry install --no-interaction --no-root

      - name: Run Django Database Migrations
        run: |
          poetry run python manage.py migrate

      - name: Run Pytest Suite
        run: |
          poetry run pytest